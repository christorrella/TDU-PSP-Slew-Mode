_S ULUS-10249
_G Test Drive Unlimited

_C1 Slew Mode V0.3

// created by Christopher Torrella
// dedicated to my late Father who bought me Test Drive Unlimited when I was a kid. Love you, Dad.

// Override player positional coordinate addition instructions; instead, jump to custom X/Z/Y funcs
_L 0x203C6DD8 0x0A200408    // j        0x08801020
_L 0x203C6DF8 0x0A20042a    // j        0x088010A8
_L 0x203C6E10 0x0A200446    // j        0x08801118

// Slew speed has 4 bytes reserved space at 0x08801000

// Button status address table
_L 0x20001004 0x09621F4C    // address of TCS Mode status
_L 0x20001008 0x0935046C    // address of analog left DISPLACEMENT
_L 0x2000100C 0x09350418    // address of analog right DISPLACEMENT
_L 0x20001010 0x093501A4    // address of circle status
_L 0x20001014 0x093500FC    // address of square status
_L 0x20001018 0x093503C4    // address of analog up DISPLACEMENT
_L 0x2000101C 0x09350370    // address of analog down DISPLACEMENT

// Start of control functions

// Custom Function for Player Position X Coordinate

// Write slew speed as 1x in reserved space
_L 0x20001020 0x3C010880    // lui      $at,0x880
_L 0x20001024 0x3C0E3F80    // lui      $t6,0x3f80
_L 0x20001028 0xAC2E1000    // sw       $t6, 0x1000($at)

// If TCS is 1, jump to Check Analog Left
_L 0x2000102C 0x8C211004    // lw       $at,0x1004($at)
_L 0x20001030 0x802E0000    // lb       $t6,0x0($at)
_L 0x20001034 0x20010001    // li       $at,0x1
_L 0x20001038 0x11C1000D    // beq      $t6,$at,Check Analog Left (+ 0x38)
_L 0x2000103C 0x00000000    // nop

// Write slew speed as 5x in reserved space
_L 0x20001040 0x3C010880    // lui      $at,0x880
_L 0x20001044 0x3C0E40A0    // lui      $t6,0x40a0
_L 0x20001048 0xAC2E1000    // sw       $t6, 0x1000($at)

// If TCS is 2, jump to Check Analog Left
_L 0x2000104C 0x8C211004    // lw       $at,0x1004($at)
_L 0x20001050 0x802E0000    // lb       $t6,0x0($at)
_L 0x20001054 0x20010002    // li       $at,0x2
_L 0x20001058 0x11C10005    // beq      $t6,$at,Check Analog Left (+ 0x18)
_L 0x2000105C 0x00000000    // nop

// Add the two numbers in fx, fy
_L 0x20001060 0x46020000    // add.s    $f0,$f0,$f2

// Restore at, jump to X
_L 0x20001064 0x3C010000    // lui      $at,0x0
_L 0x20001068 0x0A2F1B77    // j        0x08BC6DDC
_L 0x2000106C 0x00000000    // nop

// Check Analog Left
_L 0x20001070 0x3c010880    // lui      $at,0x880           load offset of script into $at
_L 0x20001074 0xc4221000    // lwc1     $f2,0x1000($at)     load the slew speed multiplier value at 0x1000 into $f2
_L 0x20001078 0x8C2E1008    // lw       $t6,0x1008($at)     load address of analog left displacement into $t6
_L 0x2000107C 0xc5df0000    // lwc1     $f31,0x0($t6)       load value of analog left displacement into $f31
_L 0x20001080 0x461f1082    // mul.s    $f2,$f2,$f31        multiply $f2 (speed multiplier) by $f31 (analog displacement) and store in $f2
_L 0x20001084 0x46020000    // add.s    $f0,$f0,$f2            add result of multiplication to $f0 and store in $f0

// Check Analog Right
_L 0x20001088 0xc4221000    // lwc1     $f2,0x1000($at)     load the slew speed multiplier value at 0x1000 into $f2
_L 0x2000108C 0x8c2e100c    // lw       $t6,0x100C($at)     load address of analog right displacement into $t6
_L 0x20001090 0xc5df0000    // lwc1     $f31,0x0($t6)       load value of analog right displacement into $f31
_L 0x20001094 0x461f1082    // mul.s    $f2,$f2,$f31        multiply $f2 (speed multiplier) by $f31 (analog displacement) and store in $f2
_L 0x20001098 0x46020001    // sub.s    $f0,$f0,$f2         add result of multiplication to $f0 and store in $f0

// Return To X
_L 0x2000109C 0x3C010000    // lui      $at,0x0
_L 0x200010A0 0x0A2F1B77    // j        0x08BC6DDC
_L 0x200010A4 0x00000000    // nop

// Custom Function for Player Position Z Coordinate

// Check if TCS mode is not 0
_L 0x200010A8 0x3C010880    // lui      $at,0x880
_L 0x200010AC 0x8c211004    // lw       $at,0x1004($at)
_L 0x200010B0 0x802e0000    // lb       $t6,0x0($at)
_L 0x200010B4 0x15c00005    // bne      $t6,$zero,0x18
_L 0x200010B8 0x00000000    // nop

// Add the two numbers in fx fy
_L 0x200010BC 0x46031080    // add.s    $f2,$f2,$f3

// Restore at, jump to Z
_L 0x200010C0 0x3C010000    // lui      $at,0x0
_L 0x200010C4 0x0A2F1B7F    // j        0x08BC6DFC
_L 0x200010C8 0x00000000    // nop

// Check Circle
_L 0x200010CC 0x3C010880    // lui      $at,0x880
_L 0x200010D0 0x8C211010    // lw       $at,0x1010(at)
_L 0x200010D4 0x802E0000    // lb       $t6,0x0($at)
_L 0x200010D8 0x11C00004    // beq      $t6,$zero,Check Square
_L 0x200010DC 0x00000000    // nop
_L 0x200010E0 0x3C010880    // lui      $at,0x880
_L 0x200010E4 0xC4231000    // lwc1     $f3,0x1000($at)
_L 0x200010E8 0x46031080    // add.s    $f2,$f2,$f3

// Check Square
_L 0x200010EC 0x3C010880    // lui      $at,0x880
_L 0x200010F0 0x8C211014    // lw       $at,0x1014($at)
_L 0x200010F4 0x802E0000    // lb       $t6,0x0($at)
_L 0x200010F8 0x11C00004    // beq      $t6,$zero,Return To Z
_L 0x200010FC 0x00000000    // nop
_L 0x20001100 0x3C010880    // lui      $at,0x880
_L 0x20001104 0xC4231000    // lwc1     $f3,0x1000($at)
_L 0x20001108 0x46031081    // sub.s    $f2,$f2,$f3

// Return To Z
_L 0x2000110C 0x3C010000    // lui      $at,0x0
_L 0x20001110 0x0A2F1B7F    // j        0x08BC6DFC
_L 0x20001114 0x00000000    // nop

// Custom Function for Player Position Y Coordinate

// Check if TCS mode is not 0
_L 0x20001118 0x3C010880    // lui      $at,0x880
_L 0x2000111C 0x8c211004    // lw       $at,0x1004($at)
_L 0x20001120 0x802e0000    // lb       $t6,0x0($at)
_L 0x20001124 0x15c00005    // bne      $t6,$zero,Check Analog Up
_L 0x20001128 0x00000000    // nop

// Add the two numbers in fx fy
_L 0x2000112C 0x46031080    // add.s    $f2,$f2,$f3

// Restore at, jump to Y
_L 0x20001130 0x3C010000    // lui      $at,0x0
_L 0x20001134 0x0A2F1B85    // j        0x08BC6E14
_L 0x20001138 0x00000000    // nop

// Check Analog Up

_L 0x2000113C 0x3c010880    // lui      $at,0x880           load offset of script into $at
_L 0x20001140 0xc4231000    // lwc1     $f3,0x1000($at)     load the slew speed multiplier value at 0x1000 into $f3
_L 0x20001144 0x8C2e1018    // lw       $t6,0x1018($at)     load address of analog UP displacement into $t6
_L 0x20001148 0xc5df0000    // lwc1     $f31,0x0($t6)       load value of analog UP displacement into $f31
_L 0x2000114C 0x461f18c2    // mul.s    $f3,$f3,$f31        multiply $f3 (speed multiplier) by $f31 (analog displacement) and store in $f3
_L 0x20001150 0x46031080    // add.s    $f2,$f2,$f3         add result of multiplication to $f2 and store in $f2


// Check Analog Down

_L 0x20001154 0xc4231000    // lwc1     $f3,0x1000($at)     load the slew speed multiplier value at 0x1000 into $f3
_L 0x20001158 0x8c2e101c    // lw       $t6,0x101C($at)     load address of analog DOWN displacement into $t6
_L 0x2000115C 0xc5df0000    // lwc1     $f31,0x0($t6)       load value of analog DOWN displacement into $f31
_L 0x20001160 0x461f18c2    // mul.s    $f3,$f3,$f31        multiply $f3 (speed multiplier) by $f31 (analog displacement) and store in $f3
_L 0x20001164 0x46031081    // sub.s    $f2,$f2,$f3         add result of multiplication to $f2 and store in $f2

// Return To Y
_L 0x20001168 0x3C010000    // lui      $at,0x0
_L 0x2000116C 0x0A2F1B85    // j        0x08BC6E14
_L 0x20001170 0x00000000    // nop

// Facing

// Override "facing" instructions, jump to Affect Faces
_L 0x203C716C 0x0A200481    // j        0x08801204
_L 0x203C7170 0x00000000    // nop

// Custom Function for Player Orientation ("Facing")

_L 0x20001204 0x3C010880    // lui      at,0x880
_L 0x20001208 0x8C211004    // lw       at,0x1004(at)
_L 0x2000120C 0x80210000    // lb       at,0x0(at)
_L 0x20001210 0x11C00009    // beq      at, zero, go to Normal face settings
_L 0x20001214 0x00000000    // nop

// Alternate face settings
_L 0x20001218 0xAC800080    // sw       zero,0x80(a0)
_L 0x2000121C 0x46034042    // mul.s    f1,f8,f3
_L 0x20001220 0xAC800084    // sw       zero,0x84(a0)
_L 0x20001224 0xE7A00044    // swc1     f0,0x44(sp)
_L 0x20001228 0x46033802    // mul.s    f0,f7,f3
_L 0x2000122C 0xAC800088    // sw       zero,0x88(a0)
_L 0x20001230 0x0A2F1C61    // j        0x08BC7184
_L 0x20001234 0x00000000    // nop

// Normal face settings
_L 0x20001238 0xE4810080    // swc1     f1,0x80(a0)
_L 0x2000123C 0x46034042    // mul.s    f1,f8,f3
_L 0x20001240 0xE4800084    // swc1     f0,0x84(a0)
_L 0x20001244 0xE7A00044    // swc1     f0,0x44(sp)
_L 0x20001248 0x46033802    // mul.s    f0,f7,f3
_L 0x2000124C 0xE4810088    // swc1     f1,0x88(a0)
_L 0x20001250 0x0A2F1C61    // j        0x08BC7184
_L 0x20001254 0x00000000    // nop

// Change "TCS Mode" text to "Slew Mode"
