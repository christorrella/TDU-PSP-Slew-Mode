_L 0x20D0467C 0x4F4D2057    //OM W
_L 0x20D04680 0x20204544    //  ED
_L 0x20D04684 0x58450020    //XE. 
_L 0x20D00260 0x41534944    //ASID
_L 0x20D00264 0x00454C42    //.ELB
_L 0x20D00268 0x45455053    //EEPS
_L 0x20D0026C 0x20312044    // 1 D
